<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>منصة التقارير التنفيذية للتطوير المهني</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:#edf4f6;color:#17343d}
.wrap{max-width:1320px;margin:auto;padding:18px}
.top{background:linear-gradient(135deg,#053743,#0b6f7d);color:white;border-radius:22px;padding:20px;text-align:center;margin-bottom:18px;box-shadow:0 10px 28px rgba(0,0,0,.15)}
.top h1{font-size:30px;margin-bottom:8px}
.top p{font-size:17px;color:#dffbf8}
.main{display:grid;grid-template-columns:440px 1fr;gap:18px;align-items:start}
.panel,.report{background:white;border-radius:18px;box-shadow:0 10px 26px rgba(0,0,0,.10)}
.panel{padding:20px;position:sticky;top:10px}
.panel h2{font-size:23px;color:#075464;border-bottom:2px solid #dcebee;padding-bottom:10px;margin-bottom:13px}
label{display:block;font-weight:800;margin:12px 0 6px;color:#17343d}
input,select,textarea{width:100%;border:1px solid #cbdbe0;border-radius:12px;padding:12px;font-size:15px;font-family:Tahoma,Arial,sans-serif;background:#fff}
textarea{min-height:82px;line-height:1.8;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;border:0;border-radius:13px;padding:14px;margin-top:14px;font-size:17px;font-weight:900;color:white;background:#087184;cursor:pointer}
button.alt{background:#15996f}
button.gray{background:#52656b}
.report{padding:30px 34px;min-height:1120px}
.visual-header img{width:100%;display:block;border-radius:4px;margin-bottom:24px}
.report-title{text-align:center;margin:18px 0}
.report-title h1{font-size:31px;color:#053743;margin-bottom:8px}
.report-title h2{font-size:22px;color:#087184}
.line{height:4px;background:#087184;margin:16px 0 23px;border-radius:30px}
.dashboard{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.kpi{background:#f2fbfb;border:1px solid #d4eaee;border-radius:16px;padding:13px;text-align:center}
.kpi .ico{font-size:26px}
.kpi b{display:block;font-size:21px;color:#053743;margin:5px 0}
.kpi span{font-size:12.5px;color:#52656b}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.info-box{border:1px solid #dce8eb;border-right:7px solid #087184;border-radius:14px;padding:13px 15px;background:#fbfeff;font-size:16px}
.info-box b{color:#052f38}
.section-title{font-size:21px;font-weight:900;color:#053743;border-right:7px solid #15996f;padding:9px 12px;margin:22px 0 12px;background:#eefafa;border-radius:10px}
.text{white-space:pre-wrap;line-height:2.05;font-size:17px;color:#122f38;padding:4px 8px}
.smart-table{width:100%;border-collapse:collapse;margin:10px 0 18px;font-size:15px}
.smart-table th{background:#dfecef;color:#12343d;border:1px solid #78939b;padding:9px}
.smart-table td{border:1px solid #9db0b6;padding:8px;vertical-align:top}
.chart-box{height:270px;border:1px solid #dbe8eb;border-radius:16px;padding:12px;margin:14px 0;background:#fbfeff}
.qr-box{display:grid;grid-template-columns:180px 1fr;gap:18px;align-items:center;border:1px dashed #0b7285;background:#f4fbfb;padding:16px;border-radius:16px;margin-top:12px}
#qrcode{width:160px;height:160px;margin:auto;background:white;padding:8px;border-radius:10px}
.attendance-title{text-align:center;font-size:22px;font-weight:900;margin:28px 0 12px;color:#111}
.attendance-table{width:100%;border-collapse:collapse;font-size:13px;direction:rtl}
.attendance-table th{background:#e8e8e8;border:1px solid #111;padding:6px;text-align:center}
.attendance-table td{border:1px solid #111;padding:6px;height:30px}
.num{width:38px;text-align:center;font-weight:bold}
.signcol{width:95px}
.signs{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:42px}
.sign{text-align:center;padding-top:14px;border-top:2px solid #5a6b70;font-weight:800;line-height:2}
.footer{margin-top:34px;border-top:2px dashed #c8d4d8;padding-top:14px;text-align:center;color:#51656b;line-height:2}
.empty{text-align:center;color:#60747a;padding:70px 20px;font-size:20px;line-height:2}

.report-block{
  break-inside:avoid;
  page-break-inside:avoid;
  margin-bottom:18px;
}
.section-title{
  break-after:avoid;
  page-break-after:avoid;
}
.section-title + .text,
.section-title + .smart-table,
.section-title + .chart-box,
.section-title + ul{
  break-before:avoid;
  page-break-before:avoid;
}
.chart-box{
  max-width:760px;
  margin:14px auto 22px;
}
.attendance-select{
  width:100%;
  border:1px solid #9db0b6;
  border-radius:8px;
  padding:6px;
  font-weight:800;
  text-align:center;
  background:#fff;
}
.attendance-select.present{
  color:#0b66c3;
}
.attendance-select.absent{
  color:#d01818;
}
.attendance-table th.statuscol,
.attendance-table td.statuscol{
  width:115px;
}

@media(max-width:1000px){.main{grid-template-columns:1fr}.panel{position:static}.dashboard,.info-grid,.signs,.qr-box{grid-template-columns:1fr}}
@media print{
@page{size:A4;margin:9mm}
body{background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.top,.panel{display:none!important}
.wrap{padding:0;max-width:none}
.main{display:block}
.report{box-shadow:none;border-radius:0;padding:0;min-height:auto}
.chart-box,.dashboard,.smart-table,.qr-box{break-inside:avoid}
.attendance-table{font-size:11.2px}
}

@media print{
.attendance-title,.attendance-table,.signs{
 break-inside:avoid !important;
 page-break-inside:avoid !important;
}
.attendance-table{
 page-break-before:avoid !important;
 page-break-after:avoid !important;
 font-size:10px !important;
 transform:scale(0.92);
 transform-origin:top center;
 width:108%;
 margin-right:-4%;
}
.signs{margin-top:14px !important;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>منصة التقارير التنفيذية للتطوير المهني</h1>
    <p>مجمع كريمة بنت همام - المتوسط والثانوي</p>
  </div>

  <div class="main">
    <div class="panel">
      <h2>إعداد التقرير</h2>

      <label>اسم المعلمة / المنفذة</label>
      <input id="teacherName" placeholder="اكتبي الاسم هنا">

      <label>نوع التقرير</label>
      <select id="reportType" onchange="setTemplate()">
        <option>شهادة مهنية</option>
        <option>ورشة عمل</option>
        <option>برنامج تدريبي</option>
        <option>مجتمع مهني</option>
        <option>زيارة تبادلية</option>
        <option>درس تطبيقي</option>
        <option>تطبيق استراتيجية</option>
        <option>تغذية راجعة وقياس أثر</option>
      </select>

      <label>عنوان التقرير / موضوع اللقاء</label>
      <input id="title" placeholder="مثال: التحصيل الدراسي">

      <div class="row2">
        <div><label>تاريخ البداية</label><input id="startDate" type="date"></div>
        <div><label>تاريخ النهاية</label><input id="endDate" type="date"></div>
      </div>

      <div class="row2">
        <div><label>عدد المستفيدات</label><input id="count" type="number" placeholder="25"></div>
        <div></div>
      </div>

      <div class="row2">
        <div><label>نسبة الإنجاز</label><input id="achievement" type="number" min="0" max="100" value="90"></div>
        <div><label>مستوى الأثر</label><input id="impactRate" type="number" min="0" max="100" value="85"></div>
      </div>

      <div class="row2">
        <div><label>مستوى الرضا</label><input id="satisfaction" type="number" min="0" max="100" value="95"></div>
        <div><label>أولوية التحسين</label>
          <select id="priority">
            <option>منخفضة</option>
            <option>متوسطة</option>
            <option>مرتفعة</option>
          </select>
        </div>
      </div>

      <label>وصف التنفيذ</label>
      <textarea id="details"></textarea>

      <label>الأهداف</label>
      <textarea id="goals"></textarea>

      <label>المؤشرات القابلة للقياس</label>
      <textarea id="indicators"></textarea>

      <label>الأثر الاستراتيجي</label>
      <textarea id="strategicImpact"></textarea>

      <label>الأثر والنتائج</label>
      <textarea id="impact"></textarea>

      <label>التحديات</label>
      <textarea id="challenges"></textarea>

      <label>فرص التحسين</label>
      <textarea id="improvements"></textarea>

      <label>خطة الاستدامة</label>
      <textarea id="sustainability"></textarea>

      <label>التوصيات التنفيذية</label>
      <textarea id="recommendations"></textarea>

      <label>رابط الشاهد في Google Drive</label>
      <input id="driveLink" placeholder="الصقي رابط الشاهد هنا">

      <label>إظهار جدول حضور المنسوبات</label>
      <select id="showAttendance">
        <option value="yes">نعم</option>
        <option value="no">لا</option>
      </select>

      <button onclick="generateReport()">إنشاء التقرير</button>
      <button class="alt" onclick="window.print()">طباعة / حفظ PDF</button>
      <button class="gray" onclick="setTemplate()">تعبئة نموذج مقترح</button>
    </div>

    <div class="report" id="reportArea">

function normalizeDriveLink(url){
  url = String(url || "").trim();
  if(!url) return "";
  const match = url.match(/\/d\/([^\/]+)/) || url.match(/[?&]id=([^&]+)/);
  if(match && match[1]){
    return "https://drive.google.com/file/d/" + match[1] + "/view?usp=sharing";
  }
  return url;
}

function googleSearchLink(title, type){
  const query = encodeURIComponent((title || "") + " " + (type || ""));
  return "https://www.google.com/search?q=" + query;
}

    <div class="kpi"><div class="ico">✅</div><b>${achievement}%</b><span>نسبة الإنجاز</span></div>
    <div class="kpi"><div class="ico">📈</div><b>${impactRate}%</b><span>مستوى الأثر</span></div>
    <div class="kpi"><div class="ico">⭐</div><b>${satisfaction}%</b><span>مستوى الرضا</span></div>
    <div class="kpi"><div class="ico">🔎</div><b>${priority}</b><span>أولوية التحسين</span></div>
  </div>

  <div class="info-grid">
    <div class="info-box"><b>اسم المعلمة / المنفذة:</b> ${teacher}</div>
    <div class="info-box"><b>عنوان التقرير:</b> ${title}</div>
    <div class="info-box"><b>بداية التنفيذ:</b> ${startDate}</div>
    <div class="info-box"><b>نهاية التنفيذ:</b> ${endDate}</div>
    <div class="info-box"><b>نوع التقرير:</b> ${type}</div>
  </div>

  <div class="section-title">الملخص التنفيذي</div>
  <div class="text">يوثق هذا التقرير نشاطًا من أنشطة التطوير المهني بمنهجية تنفيذية تبرز مستوى الإنجاز، ومؤشرات الأثر، وفرص التحسين، والتوصيات الإجرائية بما يدعم جودة الأداء المدرسي واستدامة الممارسات المهنية.</div>

  <div class="report-block"><div class="section-title">وصف التنفيذ</div><div class="text">${details}</div></div>

  <div class="report-block"><div class="section-title">الأهداف</div>
  <table class="smart-table"><tr><th>م</th><th>الهدف</th><th>مؤشر التحقق</th></tr>${listRows(goals,"<td>قابل للقياس والمتابعة</td>")}</table></div>

  <div class="report-block"><div class="section-title">مؤشرات الأداء القابلة للقياس</div>
  <table class="smart-table"><tr><th>م</th><th>المؤشر</th><th>النتيجة المتوقعة</th></tr>${listRows(indicators,"<td>تحسين الممارسة ورفع جودة الأداء</td>")}</table></div>

  <div class="report-block"><div class="section-title">الرسم البياني التنفيذي</div>
  <div class="chart-box"><canvas id="reportChart"></canvas></div></div>

  <div class="report-block"><div class="section-title">الأثر الاستراتيجي</div><div class="text">${strategicImpact}</div></div>
  <div class="report-block"><div class="section-title">الأثر والنتائج</div><ul class="text">${bullets(impact)}</ul></div>
  <div class="report-block"><div class="section-title">التحديات</div><ul class="text">${bullets(challenges)}</ul></div>
  <div class="report-block"><div class="section-title">فرص التحسين</div><ul class="text">${bullets(improvements)}</ul></div>
  <div class="report-block"><div class="section-title">خطة الاستدامة</div><ul class="text">${bullets(sustainability)}</ul></div>

  <div class="report-block"><div class="section-title">التوصيات التنفيذية</div>
  <table class="smart-table"><tr><th>م</th><th>التوصية</th><th>الإجراء المقترح</th><th>مؤشر النجاح</th></tr>${listRows(recommendations,"<td>تنفيذ ومتابعة</td><td>شاهد تنفيذ / تحسن ملحوظ</td>")}</table></div>

  ${qrBlock}
  ${attendance}

  <div class="signs">
    <div class="sign">توقيع المعلمة / المنفذة<br>${teacher}</div>
    <div class="sign">اعتماد قائدة المدرسة<br>الأستاذة / ابتهال عبدالله الصاملي</div>
  </div>

  <div class="footer">تم إنشاء التقرير عبر منصة التقارير التنفيذية للتطوير المهني<br>إعداد وتصميم: الأستاذة مهاء يوسف عبدالله الشهراني</div>
  `;

  if(link) new QRCode(document.getElementById("qrcode"),{text:link,width:160,height:160,correctLevel:QRCode.CorrectLevel.H});

  const ctx=document.getElementById("reportChart");
  if(ctx){
    if(chartInstance) chartInstance.destroy();
    chartInstance=new Chart(ctx,{
      type:"bar",
      data:{labels:["نسبة الإنجاز","مستوى الأثر","مستوى الرضا"],datasets:[{label:"النسبة",data:[achievement,impactRate,satisfaction],backgroundColor:["#087184","#15996f","#f0a43a"],borderColor:["#065866","#0f7757","#b87920"],borderWidth:1}]},
      options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:100}},plugins:{legend:{display:false}}}
    });
  }
}
setTemplate();
</script>
</body>
</html>
